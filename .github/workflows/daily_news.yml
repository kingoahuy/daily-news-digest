name: Daily News Digest

on:
  schedule:
    - cron: "13 8 * * *"
      timezone: "Asia/Singapore"
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily news digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          MAX_NEWS_PER_CATEGORY: ${{ secrets.MAX_NEWS_PER_CATEGORY }}
          NEWS_LOOKBACK_HOURS: ${{ secrets.NEWS_LOOKBACK_HOURS }}
        run: |
          if [ "${{ vars.ENABLE_GITHUB_PAGES }}" = "true" ]; then
            python -m src.main --send --export-pages
          else
            python -m src.main --send
          fi

      - name: Commit generated Pages archive
        if: vars.ENABLE_GITHUB_PAGES == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No docs changes to commit."
          else
            git commit -m "docs: publish bilingual news radar"
            git push
          fi

      - name: Configure GitHub Pages
        if: vars.ENABLE_GITHUB_PAGES == 'true'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: vars.ENABLE_GITHUB_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Upload generated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-report-${{ github.run_id }}
          path: reports/*.md
          if-no-files-found: ignore
          retention-days: 14

  deploy-pages:
    if: vars.ENABLE_GITHUB_PAGES == 'true'
    needs: build-and-send
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
