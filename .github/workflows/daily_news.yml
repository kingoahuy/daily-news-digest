name: Daily News Digest

# Email delivery is intentionally local-only. This workflow can only be
# started manually and never receives SMTP credentials.
on:
  workflow_dispatch:

concurrency:
  group: daily-news-digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preflight check
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          MAX_NEWS_PER_CATEGORY: ${{ secrets.MAX_NEWS_PER_CATEGORY }}
          NEWS_LOOKBACK_HOURS: ${{ secrets.NEWS_LOOKBACK_HOURS }}
        run: |
          set -o pipefail
          mkdir -p logs
          python scripts/check_actions_env.py --mode dry-run 2>&1 | tee logs/preflight.log

      - name: Generate report without email
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          MAX_NEWS_PER_CATEGORY: ${{ secrets.MAX_NEWS_PER_CATEGORY }}
          NEWS_LOOKBACK_HOURS: ${{ secrets.NEWS_LOOKBACK_HOURS }}
        run: |
          set -o pipefail
          mkdir -p logs
          if [ "${{ vars.ENABLE_GITHUB_PAGES }}" = "true" ]; then
            python -m src.main --dry-run --export-pages 2>&1 | tee logs/actions_run.log
          else
            python -m src.main --dry-run 2>&1 | tee logs/actions_run.log
          fi

      - name: Commit generated Pages archive
        if: vars.ENABLE_GITHUB_PAGES == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No docs changes to commit."
          else
            git commit -m "docs: publish news radar archive"
            git push
          fi

      - name: Configure GitHub Pages
        if: vars.ENABLE_GITHUB_PAGES == 'true'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: vars.ENABLE_GITHUB_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Upload generated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-report-${{ github.run_id }}
          path: reports/*.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload action logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: action-logs-${{ github.run_id }}
          path: logs/*.log
          if-no-files-found: ignore
          retention-days: 14

  deploy-pages:
    if: vars.ENABLE_GITHUB_PAGES == 'true'
    needs: build-report
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
